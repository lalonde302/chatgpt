<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        #chat-container { width: 400px; margin: 50px auto; background: #fff; padding: 20px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #messages { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; }
        .user { color: blue; }
        .bot { color: green; }
        #input-form { display: flex; }
        #user-input { flex: 1; padding: 8px; }
        #send-btn { padding: 8px; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <form id="input-form">
            <input type="text" id="user-input" placeholder="Type your message" required>
            <button id="send-btn" type="submit">Send</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('input-form');
        const input = document.getElementById('user-input');
        const messages = document.getElementById('messages');

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.textContent = text;
            div.className = 'message ' + className;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const userText = input.value.trim();
            if (!userText) return;
            appendMessage('You: ' + userText, 'user');
            input.value = '';

            // Placeholder for chatbot response
            const botResponse = 'Bot: ' + userText;
            appendMessage(botResponse, 'bot');
        });
    </script>
</body>
</html>
